; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[PROJECT]
build_flags =
    -D PROJECT_NAME=\"RoverQTH\"
    -D PROJECT_VERSION=\"1.3.0\"
    -D PROJECT_AUTHOR=\"DeathManOne\"
    -D PROJECT_LICENSE=\"GPLv3+\"
    -D PROJECT_URL=\"github.com/DeathManOne/RoverQTH\"

[GPS]
build_flags =
    -D GPS_RX=2
    -D GPS_TX=3
    -D GPS_BAUD=38400
lib_deps =
    GPS=https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library.git#v2.2.28

[SDCard]
build_flags =
    -D SD_CS=4
    -D SD_MOSI=5
    -D SD_MISO=6
    -D SD_CLK=7
lib_deps =
	SDCard=https://github.com/DeathManOne/SDCard.git#2.0.0

[TFT]
build_flags =
    -D TFT_TOUCH_CS=8
    -D TFT_SCREEN_CS=9
    -D TFT_SCREEN_DC=10
    -D TFT_SCREEN_RST=-1
    -D TFT_MOSI=11
    -D TFT_MISO=12
    -D TFT_CLK=13
    -D TFT_WIDTH=480
    -D TFT_HEIGHT=320
lib_deps =
    TFT=https://github.com/DeathManOne/Screen-4inch-320x480-ST7796---MSP4020-and-MSP4021.git#1.3.8

[BATT]
build_flags =
    -D BATT_PIN=17

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
build_flags =
    ${PROJECT.build_flags}
    ${BATT.build_flags}
    ${GPS.build_flags}
    ${TFT.build_flags}
    ${SDCard.build_flags}
lib_deps =
    ${GPS.lib_deps}
    ${TFT.lib_deps}
    ${SDCard.lib_deps}
monitor_speed = 115200